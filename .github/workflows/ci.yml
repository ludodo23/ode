name: C++ CI - Conan Install, Build, Create

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Python for Conan
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # Install Conan
      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan

      # Configure default Conan profile
      - name: Configure Conan profile
        run: |
          conan profile detect

      # Install dependencies
      - name: Conan Install
        run: conan install . --build=missing

      # Build the project
      - name: Conan Build
        run: conan build .
      
      - name: Run tests
        run: ctest --test-dir build  --output-on-failure --output-junit test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results.xml

      # Create the package and test
      - name: Conan Create
        run: conan create . --build=missing